name: Build Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        run: |
          cd rust/aspect-extraction-core
          maturin build --release --out ../../dist
        env:
          CARGO_TERM_COLOR: always

      - name: Upload wheels
        uses: actions/upload-artifact@v3
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: |
          cd rust/aspect-extraction-core
          maturin build --sdist --out ../../dist

      - name: Upload sdist
        uses: actions/upload-artifact@v3
        with:
          name: sdist
          path: dist/*.tar.gz

  test-wheels:
    name: Test wheels on ${{ matrix.os }}
    needs: [build-wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v3
        with:
          name: wheels-${{ matrix.os }}
          path: dist

      - name: Install wheel
        run: |
          pip install --find-links dist aspect-extraction-core
          pip install pytest

      - name: Test import
        run: |
          python -c "import aspect_extraction_core; print('✓ Rust module imported')"
          python -c "from aspect_extraction_core import RuleBasedExtractor; print('✓ RuleBasedExtractor available')"
          python -c "from aspect_extraction_core import StatisticalExtractor; print('✓ StatisticalExtractor available')"

      - name: Run basic test
        run: |
          python -c "
          from aspect_extraction_core import RuleBasedExtractor
          extractor = RuleBasedExtractor()
          aspects = extractor.extract('The camera quality is excellent')
          print(f'✓ Extracted {len(aspects)} aspects')
          assert len(aspects) >= 0
          "

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, test-wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v3
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p final-dist
          cp dist/**/*.whl final-dist/ || true
          cp dist/**/*.tar.gz final-dist/ || true
          ls -lh final-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: final-dist/
